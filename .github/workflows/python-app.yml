# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10.7
      uses: actions/setup-python@v4
      with:
        python-version: "3.10.7"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov coveralls
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Install the package itself so 'import newslookout' works in tests
        pip install -e .
    - name: Lint with flake8
      run: |
        # Stop build on syntax errors, undefined names, and import errors only
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Lint with flake8 (style warnings)
      run: |
        flake8 . \
          --count \
          --exit-zero \
          --max-complexity=10 \
          --max-line-length=127 \
          --extend-ignore=C901,E721,W503 \
          --per-file-ignores="test/*.py:F401,F811,F841,F824,E302,E303,E501" \
          --statistics

    - name: Test with pytest
      run: |
        pytest test
    - name: Coverage
      run: |
        coverage run --source=src/ --branch -m pytest test/
        coverage report -m
    - name: Coveralls
      uses: AndreMiras/coveralls-python-action@develop
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel: false
        flag-name: Unit Test

